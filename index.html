<!DOCTYPE html>
<html>
<head>
<title>Love Memory</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
text-align:center;
font-family:sans-serif;
color:white;
}

.title{
margin-top:40px;
font-size:30px;
}

.photo{
width:100px;
height:100px;
border-radius:50%;
position:absolute;
animation:float 4s infinite ease-in-out;
}

.p1{
left:20%;
top:50%;
}

.p2{
left:40%;
top:65%;
}

.p3{
left:65%;
top:50%;
}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-20px);
}

100%{
transform:translateY(0px);
}

}

</style>
</head>

<body>

<h1 class="title">❤️ Our Journey ❤️</h1>

<img src="1.jpg" class="photo p1">
<img src="2.jpg" class="photo p2">
<img src="3.jpg" class="photo p3">

</body>
</html>
